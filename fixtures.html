<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Fixtures — T20 WC 2026 Predictions</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg: #000000;
            --card-hover: #0a0a0a;
            --border: #222222;
            --border-hover: #333333;
            --text: #ffffff;
            --text-muted: #888888;
            --text-hidden: #444444;
            --blue: #0070F3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding: 80px 24px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 60px;
        }

        .nav-back {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .nav-back:hover {
            color: var(--text);
        }

        h1 {
            font-size: 3rem;
            font-weight: 500;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            color: var(--text);
        }

        header p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Stage headers */
        .stage-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text);
            margin: 60px 0 24px 0;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            letter-spacing: -0.5px;
        }

        .stage-title:first-of-type {
            margin-top: 0;
        }

        /* Group sub-headers */
        .group-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-hidden);
            font-weight: 500;
            margin: 32px 0 12px 0;
        }

        .group-label:first-child {
            margin-top: 0;
        }

        /* Match row */
        .match-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            gap: 0 16px;
        }

        .match-row:last-child {
            border-bottom: none;
        }

        .match-date {
            grid-column: 1 / -1;
            font-size: 0.7rem;
            color: var(--text-hidden);
            font-variant-numeric: tabular-nums;
            padding-bottom: 8px;
        }

        .match-t1 {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            text-align: right;
        }

        .match-t2 {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
        }

        .match-vs {
            color: var(--text-hidden);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .match-name {
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .match-prob {
            font-size: 0.75rem;
            color: var(--text-hidden);
            font-variant-numeric: tabular-nums;
        }

        .match-t1.won .match-name,
        .match-t2.won .match-name {
            color: var(--text);
            font-weight: 500;
        }

        .match-t1.won .match-prob,
        .match-t2.won .match-prob {
            color: var(--blue);
        }

        /* Knockout match card */
        .ko-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            background: transparent;
            transition: all 0.3s ease;
        }

        .ko-card:hover {
            border-color: var(--border-hover);
            background: var(--card-hover);
        }

        .ko-card.final-card {
            border-color: rgba(0, 112, 243, 0.3);
            background: radial-gradient(circle at top, rgba(0, 112, 243, 0.05) 0%, transparent 100%);
        }

        .ko-card.final-card:hover {
            border-color: rgba(0, 112, 243, 0.6);
        }

        .ko-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-hidden);
            margin-bottom: 16px;
        }

        .ko-card.final-card .ko-label {
            color: var(--blue);
        }

        .ko-team {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .ko-team .name {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .ko-team .prob {
            font-size: 0.85rem;
            color: var(--text-hidden);
            font-variant-numeric: tabular-nums;
        }

        .ko-team.won .name {
            color: var(--text);
            font-weight: 500;
        }

        .ko-team.won .prob {
            color: var(--blue);
        }

        .bar-bg {
            height: 3px;
            background: var(--border);
            border-radius: 1.5px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .bar-bg:last-child {
            margin-bottom: 0;
        }

        .bar-fill {
            height: 100%;
            background: var(--blue);
            width: 0%;
            transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ko-team:not(.won) + .bar-bg .bar-fill {
            background: var(--text-hidden);
        }

        .ko-meta {
            font-size: 0.65rem;
            color: var(--text-hidden);
            margin-top: 12px;
            text-align: center;
        }

        .ko-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }

        /* Filter tabs */
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }

        .filter-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            border-color: var(--border-hover);
            color: var(--text);
        }

        .filter-btn.active {
            border-color: var(--blue);
            color: var(--text);
            background: rgba(0, 112, 243, 0.08);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
            }

            header {
                margin-bottom: 40px;
            }

            body {
                padding: 40px 16px;
            }

            .match-name {
                font-size: 0.8rem;
            }

            .match-prob {
                font-size: 0.7rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <a href="index.html" class="nav-back">← Back to Predictions</a>
            <h1>All Fixtures</h1>
            <p>Match-by-Match Predictions · 52 Games</p>
        </header>

        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="groups">Groups</button>
            <button class="filter-btn" data-filter="super8">Super 8s</button>
            <button class="filter-btn" data-filter="knockouts">Knockouts</button>
        </div>

        <div id="content"></div>
    </div>

    <script>
        fetch('data/predictions.json')
            .then(r => r.json())
            .then(data => {
                window._data = data;
                setupFilters();
                renderAll(data);
            })
            .catch(e => {
                document.getElementById('content').innerHTML = '<p style="color:var(--text-muted)">Failed to load. Run predict_t20wc.py first.</p>';
            });

        function setupFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const filter = btn.dataset.filter;
                    document.querySelectorAll('[data-section]').forEach(el => {
                        if (filter === 'all' || el.dataset.section === filter) {
                            el.style.display = '';
                        } else {
                            el.style.display = 'none';
                        }
                    });
                });
            });
        }

        const SHORT_NAMES = {
            'United States of America': 'USA',
            'United Arab Emirates': 'UAE',
            'New Zealand': 'NZ',
            'South Africa': 'SA',
            'West Indies': 'WI',
            'Sri Lanka': 'SL',
            'Netherlands': 'NED',
            'Afghanistan': 'AFG',
        };

        function shortName(name) {
            return SHORT_NAMES[name] || name;
        }

        function matchRow(m, showDate = true) {
            const t1 = shortName(m.team1);
            const t2 = shortName(m.team2);
            return `
                <div class="match-row">
                    ${showDate ? `<div class="match-date">${m.date} · ${m.venue}</div>` : '<div></div>'}
                    <div class="match-t1 ${m.winner === m.team1 ? 'won' : ''}">
                        <span class="match-prob">${m.t1_prob}%</span>
                        <span class="match-name">${t1}</span>
                    </div>
                    <div class="match-vs">vs</div>
                    <div class="match-t2 ${m.winner === m.team2 ? 'won' : ''}">
                        <span class="match-name">${t2}</span>
                        <span class="match-prob">${m.t2_prob}%</span>
                    </div>
                </div>
            `;
        }

        function koCard(label, m, isFinal = false) {
            return `
                <div class="ko-card ${isFinal ? 'final-card' : ''}">
                    <div class="ko-label">${label} · ${m.date}</div>
                    <div class="ko-team ${m.w === m.t1 ? 'won' : ''}">
                        <span class="name">${shortName(m.t1)}</span>
                        <span class="prob">${m.p1.toFixed(1)}%</span>
                    </div>
                    <div class="bar-bg"><div class="bar-fill" data-width="${m.p1}%"></div></div>
                    <div class="ko-team ${m.w === m.t2 ? 'won' : ''}">
                        <span class="name">${shortName(m.t2)}</span>
                        <span class="prob">${m.p2.toFixed(1)}%</span>
                    </div>
                    <div class="bar-bg"><div class="bar-fill" data-width="${m.p2}%"></div></div>
                    <div class="ko-meta">${m.venue}</div>
                </div>
            `;
        }

        function renderAll(data) {
            const el = document.getElementById('content');
            let html = '';

            // Group stage
            html += `<div data-section="groups">`;
            html += `<h2 class="stage-title">Group Stage</h2>`;
            for (const [group, gdata] of Object.entries(data.groups)) {
                html += `<div class="group-label">Group ${group}</div>`;
                gdata.matches.forEach(m => {
                    html += matchRow(m);
                });
            }
            html += `</div>`;

            // Super 8s
            html += `<div data-section="super8">`;
            html += `<h2 class="stage-title">Super 8 Stage</h2>`;
            data.super8.forEach(group => {
                html += `<div class="group-label">${group.title}</div>`;
                group.matches.forEach(m => {
                    html += matchRow(m);
                });
            });
            html += `</div>`;

            // Knockouts
            html += `<div data-section="knockouts">`;
            html += `<h2 class="stage-title">Knockouts</h2>`;
            html += `<div class="ko-grid">`;
            html += koCard('Semi-Final 1', data.knockouts.sf1);
            html += koCard('Semi-Final 2', data.knockouts.sf2);
            html += `</div>`;
            html += koCard('Final', data.knockouts.final, true);
            html += `</div>`;

            el.innerHTML = html;

            // Animate bars
            setTimeout(() => {
                document.querySelectorAll('.bar-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-width');
                });
            }, 100);
        }
    </script>
</body>

</html>
