<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T20 WC 2026 Predictions</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg: #000000;
            --card-hover: #0a0a0a;
            --border: #222222;
            --border-hover: #333333;
            --text: #ffffff;
            --text-muted: #888888;
            --text-hidden: #444444;
            --blue: #0070F3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding: 80px 24px;
        }

        .container {
            max-width: 1024px;
            margin: 0 auto;
        }

        /* Typography */
        header {
            margin-bottom: 80px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 500;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
            color: var(--text);
        }

        header p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .nav-link {
            display: inline-block;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
        }

        .nav-link:hover {
            color: var(--text);
            border-color: var(--text-hidden);
            background: var(--card-hover);
        }

        h2.section-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text);
            margin: 60px 0 24px 0;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            letter-spacing: -0.5px;
        }

        /* Layout */
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .grid-1 {
            display: grid;
            grid-template-columns: 1fr;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            background: transparent;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--border-hover);
            background: var(--card-hover);
        }

        .card-header h3 {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 24px;
        }

        /* Standings */
        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .team-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .team-row:first-child {
            padding-top: 0;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rank {
            color: var(--text-hidden);
            font-variant-numeric: tabular-nums;
            font-size: 0.8rem;
            width: 14px;
        }

        .stats {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .pts {
            font-variant-numeric: tabular-nums;
            font-weight: 500;
        }

        .pts-label {
            font-size: 0.65rem;
            color: var(--text-hidden);
            text-transform: uppercase;
        }

        /* Qualified vs Eliminated */
        .team-row.eliminated .name,
        .team-row.eliminated .pts {
            color: var(--text-muted);
        }

        .team-row.qualified .name,
        .team-row.qualified .pts {
            color: var(--text);
            font-weight: 500;
        }

        /* Knockouts */
        .match-team {
            margin-bottom: 20px;
        }

        .match-team:last-child {
            margin-bottom: 0;
        }

        .match-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        .match-team.eliminated .name,
        .match-team.eliminated .prob {
            color: var(--text-muted);
        }

        .match-team.winner .name,
        .match-team.winner .prob {
            color: var(--text);
            font-weight: 500;
        }

        .prob {
            font-variant-numeric: tabular-nums;
        }

        /* Minimal Progress Bar */
        .bar-bg {
            height: 3px;
            background: var(--border);
            border-radius: 1.5px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--blue);
            width: 0%;
            transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .match-team.eliminated .bar-fill {
            background: var(--text-hidden);
        }

        /* Champion Customization */
        .card.champion {
            border-color: rgba(0, 112, 243, 0.3);
            background: radial-gradient(circle at top, rgba(0, 112, 243, 0.05) 0%, transparent 100%);
        }

        .card.champion:hover {
            border-color: rgba(0, 112, 243, 0.6);
        }

        .card.champion .card-header h3 {
            color: var(--blue);
        }

        /* Match Fixture Rows */
        .match-fixture {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 12px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            gap: 8px;
        }

        .match-fixture:last-child {
            border-bottom: none;
        }

        .fixture-team {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fixture-team.left {
            justify-content: flex-end;
            text-align: right;
        }

        .fixture-team.right {
            justify-content: flex-start;
        }

        .fixture-team .name {
            color: var(--text-muted);
        }

        .fixture-team.won .name {
            color: var(--text);
            font-weight: 500;
        }

        .fixture-prob {
            font-size: 0.7rem;
            color: var(--text-hidden);
            font-variant-numeric: tabular-nums;
        }

        .fixture-team.won .fixture-prob {
            color: var(--blue);
        }

        .fixture-vs {
            color: var(--text-hidden);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            min-width: 28px;
        }

        .fixture-date {
            font-size: 0.7rem;
            color: var(--text-hidden);
            text-align: center;
            padding: 8px 0 4px;
            letter-spacing: 0.5px;
        }

        .fixture-venue {
            font-size: 0.65rem;
            color: var(--text-hidden);
            text-align: center;
            padding: 0 0 4px;
        }

        .match-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px;
            margin-top: 8px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            transition: color 0.2s;
            user-select: none;
        }

        .match-toggle:hover {
            color: var(--text);
        }

        .match-toggle .arrow {
            transition: transform 0.3s;
            font-size: 0.6rem;
        }

        .match-toggle.open .arrow {
            transform: rotate(180deg);
        }

        .matches-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .matches-list.open {
            max-height: 2000px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
            }

            header {
                margin-bottom: 40px;
            }

            body {
                padding: 40px 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>T20 World Cup</h1>
            <p>ML Match Predictions · Elo & ICC Blend</p>
            <a href="how-it-works.html" class="nav-link">Read Methodology →</a>
            <a href="fixtures.html" class="nav-link">All Fixtures →</a>
        </header>

        <h2 class="section-title">Group Stage</h2>
        <div class="grid-4" id="groups-container">
            <!-- Rendered via JS -->
        </div>

        <div id="bracket-container">
            <!-- Rendered via JS -->
        </div>
    </div>

    <script>
        // Load predictions from JSON generated by the model
        fetch('data/predictions.json')
            .then(r => r.json())
            .then(data => render(data))
            .catch(e => {
                console.error('Failed to load predictions:', e);
                document.getElementById('groups-container').innerHTML = '<p style="color:var(--text-muted)">Failed to load predictions. Run predict_t20wc.py first.</p>';
            });

        function renderFixtures(matches) {
            return matches.map(m => `
                <div class="fixture-date">${m.date} · ${m.venue}</div>
                <div class="match-fixture">
                    <div class="fixture-team left ${m.winner === m.team1 ? 'won' : ''}">
                        <span class="fixture-prob">${m.t1_prob}%</span>
                        <span class="name">${m.team1}</span>
                    </div>
                    <div class="fixture-vs">vs</div>
                    <div class="fixture-team right ${m.winner === m.team2 ? 'won' : ''}">
                        <span class="name">${m.team2}</span>
                        <span class="fixture-prob">${m.t2_prob}%</span>
                    </div>
                </div>
            `).join('');
        }

        function render(data) {
            const groupsData = data.groups;
            const super8Data = data.super8;
            const knockoutData = data.knockouts;

            // Render Groups
            const groupsContainer = document.getElementById('groups-container');
            groupsContainer.innerHTML = '';
            Object.entries(groupsData).forEach(([groupName, group]) => {
                const teams = group.standings;
                const matches = group.matches;
                const groupId = `group-${groupName}-matches`;

                let listHtml = teams.map((t, i) => `
                    <div class="team-row ${t.q ? 'qualified' : 'eliminated'}">
                        <div class="team-info">
                            <span class="rank">${i + 1}</span>
                            <span class="name">${t.name}</span>
                        </div>
                        <div class="stats">
                            <span class="pts">${t.pts}</span>
                            <span class="pts-label">pts</span>
                        </div>
                    </div>
                `).join('');

                groupsContainer.innerHTML += `
                <div class="card">
                    <div class="card-header">
                        <h3>Group ${groupName}</h3>
                    </div>
                    <div class="card-body">
                        ${listHtml}
                        <div class="match-toggle" onclick="toggleMatches('${groupId}', this)">
                            <span>Match Predictions</span>
                            <span class="arrow">▼</span>
                        </div>
                        <div class="matches-list" id="${groupId}">
                            ${renderFixtures(matches)}
                        </div>
                    </div>
                </div>`;
            });

            // Render Super 8s
            let s8Html = super8Data.map((group, gi) => {
                const s8Id = `s8-${gi}-matches`;
                return `
                <div class="card">
                    <div class="card-header">
                        <h3>${group.title}</h3>
                    </div>
                    <div class="card-body">
                        ${group.standings.map((t, i) => `
                            <div class="team-row ${t.q ? 'qualified' : 'eliminated'}">
                                <div class="team-info">
                                    <span class="rank">${i + 1}</span>
                                    <span class="name">${t.name}</span>
                                </div>
                                <div class="stats">
                                    <span class="pts">${t.pts}</span>
                                    <span class="pts-label">pts</span>
                                </div>
                            </div>
                        `).join('')}
                        <div class="match-toggle" onclick="toggleMatches('${s8Id}', this)">
                            <span>Match Predictions</span>
                            <span class="arrow">▼</span>
                        </div>
                        <div class="matches-list" id="${s8Id}">
                            ${renderFixtures(group.matches)}
                        </div>
                    </div>
                </div>
            `}).join('');

            // Render Knockouts
            const createMatchCard = (title, match, isChampion = false) => `
                <div class="card ${isChampion ? 'champion' : ''}">
                    <div class="card-header">
                        <h3>${title}${match.date ? ` · ${match.date}` : ''}</h3>
                    </div>
                    <div class="card-body">
                        <div class="match-team ${match.w === match.t1 ? 'winner' : 'eliminated'}">
                            <div class="match-info">
                                <span class="name">${match.t1}</span>
                                <span class="prob">${match.p1.toFixed(1)}%</span>
                            </div>
                            <div class="bar-bg"><div class="bar-fill" data-width="${match.p1}%"></div></div>
                        </div>
                        <div class="match-team ${match.w === match.t2 ? 'winner' : 'eliminated'}">
                            <div class="match-info">
                                <span class="name">${match.t2}</span>
                                <span class="prob">${match.p2.toFixed(1)}%</span>
                            </div>
                            <div class="bar-bg"><div class="bar-fill" data-width="${match.p2}%"></div></div>
                        </div>
                        ${match.venue ? `<div style="font-size:0.7rem;color:var(--text-hidden);margin-top:12px;text-align:center;">${match.venue}</div>` : ''}
                    </div>
                </div>
            `;

            const bracketContainer = document.getElementById('bracket-container');
            bracketContainer.innerHTML = `
                <h2 class="section-title">Super 8 Stage</h2>
                <div class="grid-2">
                    ${s8Html}
                </div>
                
                <h2 class="section-title">Semi-Finals</h2>
                <div class="grid-2">
                    ${createMatchCard('Semi-Final 1', knockoutData.sf1)}
                    ${createMatchCard('Semi-Final 2', knockoutData.sf2)}
                </div>
                
                <h2 class="section-title" style="text-align: center; border: none; margin-bottom: 0;">World Cup Final</h2>
                <div class="grid-1">
                    ${createMatchCard('Championship Final', knockoutData.final, true)}
                </div>
            `;

            // Trigger bar animations
            setTimeout(() => {
                document.querySelectorAll('.bar-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-width');
                });
            }, 100);
        }

        function toggleMatches(id, el) {
            const list = document.getElementById(id);
            list.classList.toggle('open');
            el.classList.toggle('open');
        }
    </script>
</body>

</html>
